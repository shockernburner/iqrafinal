services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: iqra
      POSTGRES_USER: iqra
      POSTGRES_PASSWORD: iqra_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iqra -d iqra"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2026-06-15T17-33-12Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: iqra_minio
      MINIO_ROOT_PASSWORD: iqra_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  web:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: replace-with-openssl-rand-base64-32
      DATABASE_URL: postgresql://iqra:iqra_dev_password@postgres:5432/iqra
      KNOWLEDGE_STORAGE_DIR: /app/storage/knowledge
      LOCAL_LLM_ENDPOINT: http://llm:8000/v1/chat/completions
      LOCAL_LLM_MODEL: replace-with-pinned-open-weight-model
      LOCAL_STT_ENDPOINT: http://stt:9000/asr
    ports:
      - "3000:3000"
    volumes:
      - knowledge-storage:/app/storage/knowledge

  llm:
    image: vllm/vllm-openai:v0.9.1
    profiles: ["gpu"]
    command: ["--model", "/models/base-model", "--served-model-name", "iqra-local"]
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.7
    profiles: ["gpu"]
    command: ["--model-id", "/models/embedding-model"]
    ports:
      - "8080:80"
    volumes:
      - ./models:/models:ro

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:1.7
    profiles: ["gpu"]
    command: ["--model-id", "/models/reranker-model"]
    ports:
      - "8081:80"
    volumes:
      - ./models:/models:ro

volumes:
  postgres-data:
  minio-data:
  knowledge-storage:
